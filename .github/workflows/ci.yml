name: FreshCart Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./freshmart-api

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './freshmart-api/package-lock.json'
        
    - name: Install dependencies
      run: npm ci

    - name: Linting
      run: npx eslint .
      continue-on-error: true # Warning only for now

    - name: Type Checking
      run: npx tsc --noEmit

    - name: Prisma Generate
      run: npx prisma generate

    - name: Run E2E Tests
      run: npx vitest run
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./freshmart-web

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './freshmart-web/package-lock.json'
        
    - name: Install dependencies
      run: npm ci

    - name: Linting
      run: npx eslint .
      continue-on-error: true # Warning only for now

    - name: Type Checking
      run: npx tsc --noEmit

    - name: Build Next.js
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
